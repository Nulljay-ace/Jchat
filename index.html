<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轻聊</title>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, sans-serif; background:#0f0f13; color:#e8e8f0; height:100vh; display:flex; overflow:hidden; }

#auth-screen {
  position:fixed; inset:0; background:#0f0f13;
  display:flex; align-items:center; justify-content:center;
  z-index:100; padding:16px;
}
.auth-box {
  background:#1a1a24; border:1px solid #2e2e40; border-radius:20px;
  padding:28px 20px; width:100%; max-width:360px;
  display:flex; flex-direction:column; gap:14px;
}
.auth-logo { text-align:center; }
.auth-logo .icon {
  width:60px; height:60px; background:linear-gradient(135deg,#07c160,#0099ff);
  border-radius:16px; display:inline-flex; align-items:center; justify-content:center;
  font-size:28px; margin-bottom:10px;
}
.auth-logo h1 { font-size:20px; font-weight:700; }
.auth-logo p { color:#7a7a9a; font-size:13px; margin-top:4px; }
.auth-tabs { display:flex; background:#22222f; border-radius:10px; padding:4px; gap:4px; }
.auth-tab {
  flex:1; padding:9px; border:none; background:none; color:#7a7a9a;
  border-radius:7px; cursor:pointer; font-size:14px; font-weight:500;
}
.auth-tab.active { background:#07c160; color:#fff; }
.auth-input {
  width:100%; background:#22222f; border:1px solid #2e2e40; border-radius:10px;
  padding:13px 14px; color:#e8e8f0; font-size:14px; outline:none;
}
.auth-input:focus { border-color:#07c160; }
.auth-input::placeholder { color:#7a7a9a; }
.auth-error { color:#ff6b6b; font-size:13px; text-align:center; min-height:16px; }
.auth-btn {
  width:100%; background:#07c160; color:#fff; border:none; border-radius:10px;
  padding:14px; font-size:15px; font-weight:600; cursor:pointer;
}
.auth-btn:active { opacity:0.85; }

#app { display:none; width:100%; height:100vh; }
.sidebar {
  width:280px; background:#1a1a24; border-right:1px solid #2e2e40;
  display:flex; flex-direction:column; flex-shrink:0;
}
.sidebar-header {
  padding:16px; border-bottom:1px solid #2e2e40;
  display:flex; align-items:center; gap:10px;
}
.my-avatar {
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(135deg,#07c160,#0099ff);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700; color:#fff; flex-shrink:0;
}
.my-name { font-size:15px; font-weight:500; flex:1; }
.logout-btn { background:none; border:none; color:#7a7a9a; cursor:pointer; font-size:20px; padding:4px; }
.search-bar { padding:10px 12px; border-bottom:1px solid #2e2e40; }
.search-bar input {
  width:100%; background:#22222f; border:1px solid #2e2e40;
  border-radius:8px; padding:8px 12px; color:#e8e8f0; font-size:13px; outline:none;
}
.new-chat-btn {
  margin:8px 12px; background:#22222f; border:1px dashed #2e2e40;
  border-radius:10px; padding:10px; color:#7a7a9a; cursor:pointer;
  font-size:13px; display:flex; align-items:center; gap:8px;
}
.conversations { flex:1; overflow-y:auto; padding:4px 0; }
.conv-item {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  cursor:pointer; border-radius:10px; margin:2px 6px;
}
.conv-item:hover, .conv-item.active { background:#22222f; }
.conv-avatar {
  width:42px; height:42px; border-radius:50%;
  background:linear-gradient(135deg,#5b5bf8,#9b59b6);
  display:flex; align-items:center; justify-content:center;
  font-size:17px; font-weight:700; color:#fff; flex-shrink:0;
}
.conv-info { flex:1; overflow:hidden; }
.conv-name { font-size:14px; font-weight:500; }
.conv-last { font-size:12px; color:#7a7a9a; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
.conv-time { font-size:11px; color:#7a7a9a; }

.chat-area { flex:1; display:flex; flex-direction:column; background:#0f0f13; min-width:0; }
.chat-header {
  padding:14px 18px; border-bottom:1px solid #2e2e40;
  display:flex; align-items:center; gap:12px; background:#1a1a24;
}
.chat-header-avatar {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,#5b5bf8,#9b59b6);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; color:#fff;
}
.chat-header-info h2 { font-size:15px; font-weight:600; }
.chat-header-info p { font-size:12px; color:#07c160; margin-top:2px; }
.messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
.empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#7a7a9a; gap:12px; }
.empty-state .big-icon { font-size:56px; opacity:0.3; }
.msg-row { display:flex; align-items:flex-end; gap:8px; }
.msg-row.me { flex-direction:row-reverse; }
.msg-avatar {
  width:30px; height:30px; border-radius:50%;
  background:linear-gradient(135deg,#5b5bf8,#9b59b6);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:#fff; flex-shrink:0;
}
.msg-row.me .msg-avatar { background:linear-gradient(135deg,#07c160,#0099ff); }
.msg-content { max-width:68%; display:flex; flex-direction:column; gap:2px; }
.msg-row.me .msg-content { align-items:flex-end; }
.msg-sender { font-size:11px; color:#7a7a9a; padding:0 4px; margin-bottom:2px; }
.bubble { padding:10px 14px; border-radius:16px 16px 16px 4px; font-size:14px; line-height:1.5; word-break:break-word; background:#2a2a3a; color:#e8e8f0; }
.msg-row.me .bubble { background:#07c160; color:#fff; border-radius:16px 16px 4px 16px; }
.msg-time { font-size:10px; color:#7a7a9a; padding:0 4px; }
.input-area {
  padding:12px 14px; border-top:1px solid #2e2e40; background:#1a1a24;
  display:flex; gap:10px; align-items:flex-end;
}
.msg-input {
  flex:1; background:#22222f; border:1px solid #2e2e40; border-radius:12px;
  padding:11px 14px; color:#e8e8f0; font-size:14px; outline:none;
  resize:none; max-height:100px; line-height:1.5;
}
.msg-input:focus { border-color:#07c160; }
.msg-input::placeholder { color:#7a7a9a; }
.send-btn {
  width:42px; height:42px; background:#07c160; border:none; border-radius:50%;
  color:#fff; font-size:18px; cursor:pointer; display:flex;
  align-items:center; justify-content:center; flex-shrink:0;
}

.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center; z-index:200; padding:16px;
}
.modal {
  background:#1a1a24; border:1px solid #2e2e40; border-radius:16px;
  padding:24px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:14px;
}
.modal h3 { font-size:17px; font-weight:600; }
.modal p { color:#7a7a9a; font-size:13px; }
.modal-input {
  width:100%; background:#22222f; border:1px solid #2e2e40; border-radius:10px;
  padding:12px 14px; color:#e8e8f0; font-size:14px; outline:none;
}
.modal-input:focus { border-color:#07c160; }
.modal-input::placeholder { color:#7a7a9a; }
.modal-actions { display:flex; gap:10px; }
.modal-cancel { flex:1; padding:11px; background:#22222f; border:1px solid #2e2e40; border-radius:10px; color:#7a7a9a; cursor:pointer; font-size:14px; }
.modal-confirm { flex:1; padding:11px; background:#07c160; border:none; border-radius:10px; color:#fff; cursor:pointer; font-size:14px; font-weight:600; }
.modal-err { color:#ff6b6b; font-size:13px; min-height:16px; }
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:#22222f; border:1px solid #2e2e40; color:#e8e8f0;
  padding:10px 20px; border-radius:20px; font-size:13px; z-index:300;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:#2e2e40; border-radius:4px; }
</style>

</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">💬</div>
      <h1>轻聊</h1>
      <p>简单、快速的即时通讯</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" onclick="switchTab('register')">注册</button>
    </div>
    <input class="auth-input" id="auth-email" type="email" placeholder="邮箱地址">
    <input class="auth-input" id="auth-password" type="password" placeholder="密码（至少6位）">
    <input class="auth-input" id="auth-username" type="text" placeholder="用户名（昵称）" style="display:none">
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">登录</button>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar" id="my-avatar">?</div>
      <span class="my-name" id="my-name">加载中...</span>
      <button class="logout-btn" onclick="doLogout()">⏻</button>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="🔍 搜索" oninput="filterConvs(this.value)">
    </div>
    <button class="new-chat-btn" onclick="openNewChat()">✉️ 发起新聊天</button>
    <div class="conversations" id="conversations">
      <div style="padding:20px;text-align:center;color:#7a7a9a;font-size:13px">暂无聊天</div>
    </div>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="empty-state">
      <div class="big-icon">💬</div>
      <p>选择聊天或发起新对话</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="new-chat-modal" style="display:none" onclick="if(event.target===this)closeNewChat()">
  <div class="modal">
    <h3>发起新聊天</h3>
    <p>输入对方的邮箱地址</p>
    <input class="modal-input" id="target-email" type="email" placeholder="对方邮箱">
    <div class="modal-err" id="modal-err"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeNewChat()">取消</button>
      <button class="modal-confirm" onclick="startChat()">开始聊天</button>
    </div>
  </div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAUtG664qKnqpNOd0tYBpmZYNOhjsbnb9I",
  authDomain: "jchat-7d193.firebaseapp.com",
  projectId: "jchat-7d193",
  storageBucket: "jchat-7d193.firebasestorage.app",
  messagingSenderId: "543992476038",
  appId: "1:543992476038:web:92a82cd739cdc558c3bc07"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

var currentUser = null;
var currentConvId = null;
var unsubMessages = null;
var unsubConvs = null;
var allConvs = [];
var currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  var tabs = document.querySelectorAll('.auth-tab');
  tabs[0].classList.toggle('active', tab === 'login');
  tabs[1].classList.toggle('active', tab === 'register');
  document.getElementById('auth-username').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = tab === 'login' ? '登录' : '注册';
  document.getElementById('auth-error').textContent = '';
}

function handleAuth() {
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value;
  var username = document.getElementById('auth-username').value.trim();
  var errEl = document.getElementById('auth-error');
  var btn = document.getElementById('auth-btn');
  errEl.textContent = '';

  if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; return; }
  if (currentTab === 'register' && !username) { errEl.textContent = '请填写用户名'; return; }

  btn.textContent = '处理中...';
  btn.disabled = true;

  if (currentTab === 'register') {
    auth.createUserWithEmailAndPassword(email, password)
      .then(function(cred) {
        return cred.user.updateProfile({ displayName: username }).then(function() {
          return db.collection('users').doc(cred.user.uid).set({
            uid: cred.user.uid,
            email: email.toLowerCase(),
            displayName: username,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        });
      })
      .catch(function(e) {
        errEl.textContent = getErrMsg(e.code);
        btn.textContent = '注册';
        btn.disabled = false;
      });
  } else {
    auth.signInWithEmailAndPassword(email, password)
      .catch(function(e) {
        errEl.textContent = getErrMsg(e.code);
        btn.textContent = '登录';
        btn.disabled = false;
      });
  }
}

function getErrMsg(code) {
  var msgs = {
    'auth/email-already-in-use': '该邮箱已被注册',
    'auth/invalid-email': '邮箱格式不正确',
    'auth/weak-password': '密码至少需要6位',
    'auth/user-not-found': '用户不存在',
    'auth/wrong-password': '密码错误',
    'auth/invalid-credential': '邮箱或密码错误'
  };
  return msgs[code] || '操作失败，请重试';
}

function doLogout() {
  if (unsubMessages) unsubMessages();
  if (unsubConvs) unsubConvs();
  auth.signOut();
}

auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    var name = user.displayName || user.email.split('@')[0];
    document.getElementById('my-name').textContent = name;
    document.getElementById('my-avatar').textContent = name[0].toUpperCase();
    listenConversations();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-btn').textContent = '登录';
    document.getElementById('auth-btn').disabled = false;
  }
});

function listenConversations() {
  var q = db.collection('conversations').where('members', 'array-contains', currentUser.uid);
  unsubConvs = q.onSnapshot(function(snap) {
    allConvs = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    allConvs.sort(function(a, b) {
      return (b.lastTime ? b.lastTime.seconds : 0) - (a.lastTime ? a.lastTime.seconds : 0);
    });
    renderConvList(allConvs);
  });
}

function renderConvList(convs) {
  var el = document.getElementById('conversations');
  if (!convs.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#7a7a9a;font-size:13px">暂无聊天，点击上方开始</div>'; return; }
  var colors = ['135deg,#5b5bf8,#9b59b6','135deg,#e74c3c,#c0392b','135deg,#f39c12,#e67e22','135deg,#1abc9c,#16a085','135deg,#3498db,#2980b9'];
  el.innerHTML = convs.map(function(c) {
    var other = getOther(c);
    var init = (other.name || '?')[0].toUpperCase();
    var ci = other.uid ? other.uid.charCodeAt(0) % colors.length : 0;
    var time = c.lastTime ? fmtTime(c.lastTime.toDate()) : '';
    return '<div class="conv-item' + (c.id === currentConvId ? ' active' : '') + '" onclick="openConv(\'' + c.id + '\')">' +
      '<div class="conv-avatar" style="background:linear-gradient(' + colors[ci] + ')">' + init + '</div>' +
      '<div class="conv-info"><div class="conv-name">' + esc(other.name || other.email || '未知') + '</div>' +
      '<div class="conv-last">' + esc(c.lastMessage || '开始聊天') + '</div></div>' +
      '<span class="conv-time">' + time + '</span></div>';
  }).join('');
}

function getOther(conv) {
  var uid = conv.members.find(function(m) { return m !== currentUser.uid; });
  var info = conv.memberInfo || {};
  return Object.assign({ uid: uid }, info[uid] || {});
}

function filterConvs(val) {
  var f = allConvs.filter(function(c) {
    var o = getOther(c);
    return (o.name || o.email || '').toLowerCase().includes(val.toLowerCase());
  });
  renderConvList(f);
}

function openConv(convId) {
  currentConvId = convId;
  var conv = allConvs.find(function(c) { return c.id === convId; });
  if (!conv) return;
  var other = getOther(conv);
  var init = (other.name || '?')[0].toUpperCase();
  document.getElementById('chat-area').innerHTML =
    '<div class="chat-header"><div class="chat-header-avatar">' + init + '</div>' +
    '<div class="chat-header-info"><h2>' + esc(other.name || other.email || '聊天') + '</h2><p>在线</p></div></div>' +
    '<div class="messages" id="messages"></div>' +
    '<div class="input-area"><textarea class="msg-input" id="msg-input" placeholder="输入消息..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>' +

```

renderConvList(allConvs);
if (unsubMessages) unsubMessages();
var q = db.collection(‘conversations’).doc(convId).collection(‘messages’).orderBy(‘createdAt’, ‘asc’);
unsubMessages = q.onSnapshot(function(snap) {
var msgs = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
renderMsgs(msgs);
});
}

function renderMsgs(msgs) {
var el = document.getElementById(‘messages’);
if (!el) return;
el.innerHTML = msgs.map(function(m) {
var isMe = m.senderId === currentUser.uid;
var time = m.createdAt ? fmtTime(m.createdAt.toDate()) : ‘’;
var init = (m.senderName || ‘?’)[0].toUpperCase();
return ‘<div class="msg-row' + (isMe ? ' me' : '') + '">’ +
‘<div class="msg-avatar">’ + init + ‘</div>’ +
‘<div class="msg-content">’ +
(!isMe ? ‘<div class="msg-sender">’ + esc(m.senderName || ‘’) + ‘</div>’ : ‘’) +
‘<div class="bubble">’ + esc(m.text) + ‘</div>’ +
‘<div class="msg-time">’ + time + ‘</div></div></div>’;
}).join(’’);
el.scrollTop = el.scrollHeight;
}

function sendMsg() {
var input = document.getElementById(‘msg-input’);
if (!input) return;
var text = input.value.trim();
if (!text || !currentConvId) return;
input.value = ‘’;
input.style.height = ‘’;
var name = currentUser.displayName || currentUser.email.split(’@’)[0];
db.collection(‘conversations’).doc(currentConvId).collection(‘messages’).add({
text: text, senderId: currentUser.uid, senderName: name,
createdAt: firebase.firestore.FieldValue.serverTimestamp()
});
db.collection(‘conversations’).doc(currentConvId).update({
lastMessage: text, lastTime: firebase.firestore.FieldValue.serverTimestamp()
});
}

function handleKey(e) { if (e.key === ‘Enter’ && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = ‘auto’; el.style.height = Math.min(el.scrollHeight, 100) + ‘px’; }

function openNewChat() {
document.getElementById(‘new-chat-modal’).style.display = ‘flex’;
document.getElementById(‘modal-err’).textContent = ‘’;
document.getElementById(‘target-email’).value = ‘’;
}
function closeNewChat() { document.getElementById(‘new-chat-modal’).style.display = ‘none’; }

function startChat() {
var email = document.getElementById(‘target-email’).value.trim().toLowerCase();
var errEl = document.getElementById(‘modal-err’);
errEl.textContent = ‘’;
if (!email) { errEl.textContent = ‘请输入邮箱’; return; }
if (email === currentUser.email.toLowerCase()) { errEl.textContent = ‘不能和自己聊天’; return; }
errEl.textContent = ‘🔍 查找用户中…’;
db.collection(‘users’).where(‘email’, ‘==’, email).get().then(function(snap) {
if (snap.empty) { errEl.textContent = ‘找不到该用户’; return; }
var target = snap.docs[0].data();
var members = [currentUser.uid, target.uid].sort();
var convId = members.join(’_’);
var convRef = db.collection(‘conversations’).doc(convId);
convRef.get().then(function(existing) {
if (!existing.exists) {
var myName = currentUser.displayName || currentUser.email.split(’@’)[0];
var info = {};
info[currentUser.uid] = { name: myName, email: currentUser.email };
info[target.uid] = { name: target.displayName, email: target.email };
convRef.set({ members: members, memberInfo: info, lastMessage: ‘’, lastTime: firebase.firestore.FieldValue.serverTimestamp() });
}
closeNewChat();
setTimeout(function() { openConv(convId); }, 300);
});
}).catch(function() { errEl.textContent = ‘发生错误，请重试’; });
}

function fmtTime(date) {
var now = new Date();
var diff = now - date;
if (diff < 60000) return ‘刚刚’;
if (diff < 3600000) return Math.floor(diff/60000) + ‘分钟前’;
if (date.toDateString() === now.toDateString()) return date.toLocaleTimeString(‘zh’, {hour:‘2-digit’,minute:‘2-digit’});
return date.toLocaleDateString(‘zh’, {month:‘numeric’,day:‘numeric’});
}

function esc(s) { return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’); }

function showToast(msg) {
var t = document.createElement(‘div’);
t.className = ‘toast’; t.textContent = msg;
document.body.appendChild(t);
setTimeout(function() { t.remove(); }, 2500);
}
</script>
